# aichat config — managed in dotfiles (https://github.com/spencerjamesstewart/dotfiles).
# Symlinked into ~/Library/Application Support/aichat/config.yaml by install.sh.
# Backs `ask --chat` (see zsh/functions.zsh): a multi-turn REPL that renders
# Markdown, unlike llm's plain-text REPL which is hard to read for long replies.
#
# NO SECRETS HERE. The Anthropic key is never written to this file — `ask` passes
# it at launch via the CLAUDE_API_KEY env var (from $ANTHROPIC_API_KEY, falling
# back to `llm keys get anthropic`). So this file is safe to commit and the
# secret-scanning pre-commit hook stays happy.
#
# require_max_tokens: true is REQUIRED on every model: the Anthropic Messages API
# rejects requests that omit max_tokens, and aichat only sends it when this flag
# is set (its built-in model entries set it; custom ones like these must too).
# Model ids are the real API names — `ask` maps its llm aliases onto them.

model: claude:claude-haiku-4-5-20251001   # default; `ask` always passes -m explicitly
stream: true
wrap: auto                                # wrap long replies to terminal width (readability)
save: false                               # don't append turns to messages.md
save_session: false                       # don't persist ad-hoc REPL chats

clients:
- type: claude
  models:
  - name: claude-haiku-4-5-20251001       # ask default            (llm alias claude-haiku-4.5)
    max_input_tokens: 200000
    max_output_tokens: 64000
    require_max_tokens: true
  - name: claude-sonnet-4-6               # ask -s / --sonnet       (llm alias claude-sonnet-4.6)
    max_input_tokens: 200000
    max_output_tokens: 64000
    require_max_tokens: true
  - name: claude-opus-4-8                 # ask -o / --opus         (llm alias claude-opus-4.8)
    max_input_tokens: 200000
    max_output_tokens: 64000
    require_max_tokens: true
